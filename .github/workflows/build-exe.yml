name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests pymem PyQt6

      - name: Install UPX
        run: |
          choco install upx -y

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --clean --strip --onefile --noconsole --name simple-injector main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-injector-exe
          path: dist/simple-injector.exe
